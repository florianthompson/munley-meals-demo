<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Munley Made Meals — Chef-Prepared, Macro-Friendly Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf9f6; font-family: 'DM Sans', sans-serif; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: inherit; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
:root {
  --bg:#faf9f6;--dark:#1a1a1a;--mid:#6b6b6b;--light:#a3a3a3;--border:#e8e5e0;
  --accent:#c0392b;--accent-hover:#a93226;--green:#2d7a4f;--green-light:#e8f5ee;--warm:#f5f0ea;
  --serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;
}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.anim-forward{animation:slideInRight .35s ease}.anim-back{animation:slideInLeft .35s ease}

.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.icon svg{display:block}
.icon-wrap{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.icon-wrap-sm{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center}

.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,26,26,.96);backdrop-filter:blur(12px);padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06)}
.navbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo-icon{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:17px}
.nav-logo-text{font-family:var(--serif);color:#fff;font-size:17px;font-weight:600;letter-spacing:-.02em}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-link{color:#bbb;font-size:14px;font-weight:500;transition:color .2s;cursor:pointer}.nav-link:hover{color:#fff}
.nav-cta{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:700;transition:background .2s}.nav-cta:hover{background:var(--accent-hover)}

.hero{padding:140px 24px 80px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,#1a1a1a 0%,#2a2320 50%,#3d2e24 100%)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(192,57,43,.12) 0%,transparent 70%)}
.hero-inner{max-width:800px;margin:0 auto;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:6px 16px;font-size:12px;color:#ccc;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:28px}
.hero h1{font-family:var(--serif);font-size:56px;font-weight:700;color:#fff;letter-spacing:-.035em;line-height:1.1;margin-bottom:20px}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero p{font-size:19px;color:#a89e96;line-height:1.6;max-width:560px;margin:0 auto 36px}
.hero-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.hero-btn-primary{background:var(--accent);color:#fff;border:none;padding:16px 36px;border-radius:14px;font-size:16px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:8px}.hero-btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.hero-btn-secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.15);padding:16px 32px;border-radius:14px;font-size:16px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px}.hero-btn-secondary:hover{background:rgba(255,255,255,.1)}
.hero-trust{display:flex;gap:28px;justify-content:center;margin-top:48px;flex-wrap:wrap}
.hero-trust-item{font-size:13px;color:#8a7f76;display:flex;align-items:center;gap:8px}

.quick-start{padding:80px 24px;background:var(--bg)}.quick-start-inner{max-width:1100px;margin:0 auto}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;text-align:center}
.section-title{font-family:var(--serif);font-size:36px;font-weight:700;letter-spacing:-.03em;text-align:center;margin-bottom:8px}
.section-sub{font-size:16px;color:var(--mid);text-align:center;margin-bottom:44px;max-width:520px;margin-left:auto;margin-right:auto}
.qs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.qs-card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:32px 24px 28px;text-align:center;transition:all .25s;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.qs-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.06)}
.qs-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transition:transform .3s}.qs-card:hover::after{transform:scaleX(1)}
.qs-name{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:6px}
.qs-desc{font-size:13px;color:var(--mid);line-height:1.5;margin-bottom:16px}
.qs-macros{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.qs-macro{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--warm);color:var(--mid)}.qs-macro.prot{background:var(--green-light);color:var(--green)}
.qs-popular{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}

.quality{padding:80px 24px;background:#fff}.quality-inner{max-width:1100px;margin:0 auto}
.quality-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:44px}
.quality-card{text-align:center;padding:28px 20px;border-radius:16px;background:var(--bg);display:flex;flex-direction:column;align-items:center}
.quality-name{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:8px}
.quality-desc{font-size:14px;color:var(--mid);line-height:1.6}

.how-it-works{padding:80px 24px;background:var(--bg)}.how-inner{max-width:900px;margin:0 auto}
.how-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:44px}
.how-step{text-align:center;display:flex;flex-direction:column;align-items:center}
.how-num{width:48px;height:48px;border-radius:50%;background:var(--dark);color:#fff;font-family:var(--serif);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.how-step-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px}
.how-step-desc{font-size:14px;color:var(--mid);line-height:1.6}

.chef{padding:80px 24px;background:#fff}
.chef-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:60px;align-items:center}
.chef-img-wrap{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/5;background:linear-gradient(135deg,#e8cfc0,#d4a88c);display:flex;align-items:center;justify-content:center}
.chef-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px}
.chef-name{font-family:var(--serif);font-size:36px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
.chef-title{font-size:16px;color:var(--mid);font-style:italic;margin-bottom:20px}
.chef-bio{font-size:15px;color:var(--mid);line-height:1.7;margin-bottom:16px}
.chef-stats{display:flex;gap:24px;margin-top:28px}
.chef-stat{text-align:center}.chef-stat-num{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--dark)}.chef-stat-label{font-size:12px;color:var(--light);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

.services{padding:80px 24px;background:var(--dark);color:#fff}.services-inner{max-width:1100px;margin:0 auto}
.services .section-label{color:var(--accent)}.services .section-title{color:#fff}.services .section-sub{color:#8a7f76}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:44px}
.service-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 28px 32px;transition:all .25s;position:relative;overflow:hidden}
.service-card:hover{background:rgba(255,255,255,.07);transform:translateY(-3px)}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent)}
.service-name{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:10px}
.service-desc{font-size:14px;color:#8a7f76;line-height:1.6;margin-bottom:20px}
.service-features{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.service-feature{font-size:13px;color:#a89e96;display:flex;align-items:center;gap:8px}
.service-cta{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border-radius:10px;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;font-weight:600;transition:all .2s;background:0 0}.service-cta:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.3)}

.cta-banner{padding:80px 24px;background:linear-gradient(135deg,var(--accent) 0%,#8e2218 100%);text-align:center}
.cta-banner h2{font-family:var(--serif);font-size:36px;font-weight:700;color:#fff;margin-bottom:12px;letter-spacing:-.03em}
.cta-banner p{font-size:17px;color:rgba(255,255,255,.75);margin-bottom:32px}
.cta-banner-btn{background:#fff;color:var(--dark);border:none;padding:16px 40px;border-radius:14px;font-size:16px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:8px}.cta-banner-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}

.footer{background:var(--dark);padding:48px 24px 32px;border-top:1px solid rgba(255,255,255,.06)}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.footer-brand{font-family:var(--serif);color:#fff;font-size:16px;font-weight:600}
.footer-links{display:flex;gap:24px}.footer-link{color:#777;font-size:13px;transition:color .2s;cursor:pointer}.footer-link:hover{color:#bbb}
.footer-copy{color:#555;font-size:12px}

.builder-wrap{display:none;min-height:100vh;padding-top:60px}.builder-wrap.visible{display:block}
.homepage{display:block}.homepage.hidden{display:none}

.progress-wrap{background:#fff;border-bottom:1px solid var(--border);padding:20px 24px}
.progress-bar{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:center}
.progress-step{display:flex;align-items:center;position:relative}
.progress-dot{width:32px;height:32px;border-radius:50%;background:var(--border);color:var(--light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;transition:all .3s;flex-shrink:0}
.progress-dot.active{background:var(--dark);color:#fff}.progress-dot.done{background:var(--green);color:#fff;cursor:pointer}
.progress-label{position:absolute;top:38px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--light);white-space:nowrap;font-weight:500}.progress-label.active{color:var(--dark)}
.progress-line{width:60px;height:2px;background:var(--border);margin:0 6px;transition:all .3s}.progress-line.done{background:var(--green)}

.builder-main{max-width:1100px;margin:0 auto;padding:40px 20px 60px}
.step-container{display:flex;flex-direction:column;gap:28px}
.step-header{text-align:center}
.heading{font-family:var(--serif);font-size:34px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.subheading{font-size:16px;color:var(--mid)}

.goal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.goal-card{position:relative;background:#fff;border:2px solid var(--border);border-radius:16px;padding:28px 20px 22px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;text-align:center;outline:none}.goal-card:hover{border-color:#ccc}.goal-card.active{border-color:var(--accent);background:#fdf8f7;box-shadow:0 0 0 1px var(--accent)}
.goal-tag{position:absolute;top:-10px;right:12px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.goal-label{font-family:var(--serif);font-size:20px;font-weight:700}
.goal-desc{font-size:13px;color:var(--mid);line-height:1.4}
.macro-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.macro-pill{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:var(--warm);color:var(--mid)}
.check-mark{position:absolute;top:10px;left:10px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;animation:popIn .25s ease}

.box-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.box-card{position:relative;background:#fff;border:2px solid var(--border);border-radius:16px;padding:30px 20px 24px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;outline:none}.box-card:hover{border-color:#ccc}.box-card.active{border-color:var(--accent);background:#fdf8f7;box-shadow:0 0 0 1px var(--accent)}
.save-badge{position:absolute;top:-10px;background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}
.box-count{font-family:var(--serif);font-size:48px;font-weight:700;line-height:1}
.box-label{font-size:14px;font-weight:600}.box-meals-label{font-size:13px;color:var(--light);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.box-divider{width:40px;height:1px;background:var(--border);margin:10px 0}
.box-price{font-size:22px;font-weight:700}.box-price-unit{font-size:13px;font-weight:400;color:var(--mid)}.box-total{font-size:13px;color:var(--light)}

.your-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px 20px}
.your-box-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.your-box-title{font-family:var(--serif);font-size:18px;font-weight:700}
.your-box-count{font-size:14px;font-weight:600;color:var(--accent);background:#fdf0ee;padding:4px 12px;border-radius:20px}
.slot-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.slot{width:80px;height:90px;border-radius:12px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.slot.filled{border:2px solid var(--border);background:#fff;overflow:hidden}
.slot-img{width:100%;height:56px;object-fit:cover;border-radius:10px 10px 0 0}
.slot-name{font-size:9px;font-weight:600;text-align:center;padding:2px 4px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.slot-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.slot-empty{font-size:16px;font-weight:600;color:var(--border)}

.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--mid);transition:all .2s;outline:none}.filter-btn:hover{border-color:#ccc}.filter-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}

.meal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.meal-card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:all .2s}.meal-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.meal-img-wrap{position:relative;width:100%;height:140px;overflow:hidden}
.meal-img{width:100%;height:100%;object-fit:cover}
.meal-count-badge{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px}
.meal-info{padding:10px 12px 6px;display:flex;flex-direction:column;gap:2px}
.meal-name{font-size:14px;font-weight:600}
.meal-macros{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.meal-macro-pill{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;background:var(--warm);color:var(--mid)}.meal-macro-pill.protein{background:var(--green-light);color:var(--green)}
.add-btn{width:calc(100% - 16px);margin:8px 8px 10px;padding:9px 0;border-radius:10px;border:1.5px solid var(--dark);background:0 0;font-size:13px;font-weight:700;color:var(--dark);transition:all .2s;outline:none}.add-btn:hover{background:var(--dark);color:#fff}.add-btn.disabled{opacity:.35;cursor:not-allowed}.add-btn.disabled:hover{background:0 0;color:var(--dark)}

.review-grid{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
.review-meals{display:flex;flex-direction:column;gap:10px}
.review-item{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;border:1px solid var(--border);padding:10px 14px;animation:popIn .3s ease}
.review-img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.review-item-info{flex:1;display:flex;flex-direction:column;gap:2px}
.review-item-name{font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.05em}
.review-item-meal{font-size:15px;font-weight:600}
.review-macro-row{display:flex;gap:4px;flex-shrink:0}
.review-macro-pill{font-size:10px;font-weight:600;padding:3px 6px;border-radius:5px;background:var(--warm);color:var(--mid)}.review-macro-pill.protein{background:var(--green-light);color:var(--green)}
.review-remove{width:28px;height:28px;border-radius:50%;background:0 0;border:1px solid var(--border);color:var(--light);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;outline:none;transition:all .15s}.review-remove:hover{background:#fdf0ee;border-color:var(--accent);color:var(--accent)}

.summary-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:24px;position:sticky;top:80px;display:flex;flex-direction:column;gap:14px}
.summary-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:4px}
.summary-row{display:flex;justify-content:space-between;font-size:15px;color:var(--mid)}.summary-row.total{font-weight:700;font-size:18px;color:var(--dark)}
.summary-divider{height:1px;background:var(--border)}
.summary-you-save{font-size:13px;color:var(--green);background:var(--green-light);padding:10px 14px;border-radius:10px;text-align:center;line-height:1.4;display:flex;align-items:center;justify-content:center;gap:6px}
.checkout-btn{width:100%;padding:16px 0;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}.checkout-btn:hover{background:var(--accent-hover)}
.summary-note{font-size:12px;color:var(--light);text-align:center}

.nav-row{display:flex;justify-content:space-between;align-items:center;padding-top:8px}
.btn-primary{padding:14px 32px;border-radius:12px;border:none;background:var(--dark);color:#fff;font-size:15px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:6px}.btn-primary:hover{background:#333}.btn-primary.disabled{opacity:.3;cursor:not-allowed}
.btn-secondary{padding:14px 24px;border-radius:12px;border:1.5px solid var(--border);background:0 0;font-size:15px;font-weight:600;color:var(--mid);transition:all .2s;display:inline-flex;align-items:center;gap:6px}.btn-secondary:hover{border-color:#ccc}

@media(max-width:900px){.hero h1{font-size:38px}.goal-grid,.box-grid,.meal-grid,.qs-grid{grid-template-columns:repeat(2,1fr)}.quality-grid,.services-grid,.how-steps{grid-template-columns:repeat(2,1fr)}.review-grid{grid-template-columns:1fr}.chef-inner{grid-template-columns:1fr;text-align:center}.chef-stats{justify-content:center}.nav-links{display:none}.hero-trust{display:none}.review-macro-row{display:none}}
@media(max-width:560px){.hero h1{font-size:30px}.hero{padding:120px 18px 60px}.section-title{font-size:28px}.goal-grid,.qs-grid{grid-template-columns:1fr}.quality-grid,.services-grid,.how-steps{grid-template-columns:1fr}.progress-line{width:30px}.builder-main{padding:28px 14px 50px}.heading{font-size:24px}.slot-row{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="root"></div>

        {step===0&&(<div className="step-container">
          <div className="step-header"><h1 className="heading">What's your goal?</h1><p className="subheading">We'll tailor your macros. No guesswork, just results.</p></div>
          <div className="goal-grid">{GOALS.map(g=>(<button key={g.id} className={`goal-card${goal===g.id?" active":""}`} onClick={()=>setGoal(g.id)}>
            {g.tag&&<span className="goal-tag">{g.tag}</span>}
            <div className="icon-wrap" style={{background:g.bg}}><I name={g.icon} size={28} color={g.ic}/></div>
            <span className="goal-label">{g.label}</span><span className="goal-desc">{g.desc}</span>
            {goal===g.id&&<div className="check-mark"><I name="check" size={14} color="#fff"/></div>}
          </button>))}</div>
          <div className="nav-row"><button className="btn-secondary" onClick={goHome}><I name="arrow-left" size={16}/> Home</button><button className={`btn-primary${goal?"":" disabled"}`} onClick={()=>goal&&go(1)}>Choose Box Size <I name="arrow-right" size={16} color="#fff"/></button></div>
        </div>)}

        {step===1&&(<div className="step-container">
          <div className="step-header"><h1 className="heading">Pick your box</h1><p className="subheading">More meals = bigger savings. All shipped fresh on Monday.</p></div>
          <div className="box-grid">{BOX_SIZES.map(b=>(<button key={b.count} className={`box-card${boxSize===b.count?" active":""}`} onClick={()=>{setBoxSize(b.count);setSelectedMeals(selectedMeals.slice(0,b.count));}}>
            {b.save&&<span className="save-badge">{b.save}</span>}
            <div className="box-count">{b.count}</div><div className="box-label">{b.label}</div><div className="box-meals-label">meals</div>
            <div className="box-divider"/><div className="box-price">{b.perMeal}<span className="box-price-unit">/meal</span></div><div className="box-total">{b.total} total</div>
            {boxSize===b.count&&<div className="check-mark"><I name="check" size={14} color="#fff"/></div>}
          </button>))}</div>
          <div className="nav-row"><button className="btn-secondary" onClick={()=>go(-1)}><I name="arrow-left" size={16}/> Back</button><button className={`btn-primary${boxSize?"":" disabled"}`} onClick={()=>boxSize&&go(1)}>Pick Your Meals <I name="arrow-right" size={16} color="#fff"/></button></div>
        </div>)}

        {step===2&&(<div className="step-container">
          <div className="step-header"><h1 className="heading">Build your box</h1><p className="subheading">{slotsLeft>0?`Pick ${slotsLeft} more meal${slotsLeft>1?"s":""} to fill your box`:"Your box is full! Review your picks below."}</p></div>
          <div className="your-box"><div className="your-box-header"><span className="your-box-title">Your Box</span><span className="your-box-count">{selectedMeals.length}/{maxMeals}</span></div>
            <div className="slot-row">{Array.from({length:maxMeals}).map((_,i)=>{const meal=selectedMeals[i];return(<div key={i} className={`slot${meal?" filled":""}`}>{meal?(<><img src={meal.img} alt={meal.name} className="slot-img"/><button className="slot-remove" onClick={()=>removeMeal(meal.uid)}><I name="x" size={10} color="#fff"/></button><span className="slot-name">{meal.name}</span></>):(<span className="slot-empty">{i+1}</span>)}</div>);})}</div>
          </div>
          <div className="filter-row">{FILTERS.map(f=>(<button key={f.id} className={`filter-btn${filter===f.id?" active":""}`} onClick={()=>setFilter(f.id)}>{f.label}</button>))}</div>
          <div className="meal-grid">{fm.map(meal=>{const count=selectedMeals.filter(m=>m.id===meal.id).length;const full=slotsLeft===0;return(<div key={meal.id} className="meal-card"><div className="meal-img-wrap"><img src={meal.img} alt={meal.name} className="meal-img"/>{count>0&&<span className="meal-count-badge">&times;{count}</span>}</div><div className="meal-info"><span className="meal-name">{meal.name}</span><div className="meal-macros"><span className="meal-macro-pill">{meal.cal} cal</span><span className="meal-macro-pill protein">P {meal.protein}g</span><span className="meal-macro-pill">C {meal.carbs}g</span><span className="meal-macro-pill">F {meal.fat}g</span></div></div><button className={`add-btn${full?" disabled":""}`} onClick={()=>!full&&addMeal(meal)}>{full?"Box Full":"+ Add"}</button></div>);})}</div>
          <div className="nav-row"><button className="btn-secondary" onClick={()=>go(-1)}><I name="arrow-left" size={16}/> Back</button><button className={`btn-primary${selectedMeals.length===maxMeals?"":" disabled"}`} onClick={()=>selectedMeals.length===maxMeals&&go(1)}>Review Order <I name="arrow-right" size={16} color="#fff"/></button></div>
        </div>)}

        {step===3&&(<div className="step-container">
          <div className="step-header"><h1 className="heading">Your meal plan</h1><p className="subheading" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span className="icon-wrap-sm" style={{background:gd?.bg}}><I name={gd?.icon} size={16} color={gd?.ic}/></span> {gd?.label} · {maxMeals} Meals</p></div>
          <div className="review-grid"><div className="review-meals">
            {selectedMeals.map((meal,i)=>(<div key={meal.uid} className="review-item"><img src={meal.img} alt={meal.name} className="review-img"/><div className="review-item-info"><span className="review-item-name">Meal {i+1}</span><span className="review-item-meal">{meal.name}</span></div><div className="review-macro-row"><span className="review-macro-pill">{meal.cal} cal</span><span className="review-macro-pill protein">P {meal.protein}g</span><span className="review-macro-pill">C {meal.carbs}g</span><span className="review-macro-pill">F {meal.fat}g</span></div><button className="review-remove" onClick={()=>removeMeal(meal.uid)}><I name="x" size={14}/></button></div>))}
          </div>
          <div className="summary-card">
            <h3 className="summary-title">Order Summary</h3>
            <div className="summary-row"><span>Plan</span><span>{gd?.label}</span></div>
            <div className="summary-row"><span>Box</span><span>{maxMeals} meals</span></div>
            <div className="summary-row"><span>Per meal</span><span>{currentBox?.perMeal}</span></div>
            <div className="summary-row"><span>Shipping</span><span style={{color:"#2d7a4f"}}>FREE</span></div>
            <div className="summary-divider"/>
            <div className="summary-row total"><span>Total</span><span>${totalPrice}</span></div>
            {currentBox?.save&&<div className="summary-you-save"><I name="sparkles" size={16} color="#2d7a4f"/> You're saving <strong>{currentBox.save.replace("Save ","")}</strong> with the {currentBox.label} box</div>}
            <button className="checkout-btn">Place Order</button>
            <p className="summary-note">Ships fresh every Monday. Arrives Tuesday–Wednesday.</p>
          </div></div>
          <div className="nav-row"><button className="btn-secondary" onClick={()=>go(-1)}><I name="arrow-left" size={16}/> Edit Meals</button><div/></div>
        </div>)}
      </div></main>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
